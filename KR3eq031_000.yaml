front:
  text: 序蓋聞乾健統天坤順得主資生之道含二氣以絪縕交泰之和統三才而埏埴德言工貌坤道云全淑慎溫柔閫儀斯著至於夙鍾靈氣生具慧姿錦織回文猶受連波之憎豔埋青冢空歸月夜之魂其它露鬢雲鬟沉迷苦海啼香恕粉填入火坑五漏形骸本是前生業障三因不悟又增今世冤愆其間修短窮通不能枚舉妍嗤愚智何可勝言總因世乏坤傳致使人難超劫是以奏請太上敕命群真闡心性於詩篇寄棒喝於轉語既知寂靜恐墮頑空更有真傳教渠下手言言玉液無非修身立命之功字字金針盡是縛虎牽龍之訣果能誠心鍛鍊眼前即是玄州依法修持鼎內便凝絳雪與世牽纏世網戀茲一息繁華何如斬斷情關占卻萬年道域西池有路度楫在茲聊綴卮言用申木鐸重陽子謹序
  hash: sha256:1b708ba582739f70c91cd5e7cf3885d0eec81b72f155b31474b588a451143758
