body:
  text: 詠性功十八首月正圓時映水明乾坤大地總瑩瑩片雁斜過潭有影移時明月映波清回春子曰巧機適合寶相團圓月照寒潭光芒四射惟清乃澄惟澄乃照寂照圓通覺靈自現西來妙義至大至圓活潑玄微東海珠還咦四海湯湯水接天水天深處自逢源海蟾子曰喜得同人注性詩明心見性道成時劉癡來與龍華會醉向澄潭捉月遲靈陽子曰此夕欣逢巧節澄清要在斯時月光皎潔印深也真個天星倒置不著離奇色相豈因空境空之一靈透出已前珠魚目應知不是長春子曰心性非一物性在心中見水月兩澄清波光自不染靈臺深廣似澄江源遠應知流自長任爾毒龍爭戲擾豈如溝血汙泥揚回春子曰清光如鑑不須鍛鍊一著揩磨毒龍便現咦沒得説西來妙義支履仍歸磨不磷兮涅不緇寵何可羡辱何辭靜中現個團圓月始信斯人不是癡回春子曰當頭一棒領者去會會者顛頭融通寂滅惡莫憎兮善莫誇堅持吾性漫憑他地雷震動真如現一任遨遊上海查回春子曰如何佛法乾天一橛霹靂一聲不怕打殺濃雲密雨霧悽悽遮卻本來菩薩面不是清風淨掃除蟾光怎得團圓現回春子曰蒲團片響剎那一刻翻個斤斗菩薩出現性似澄潭水心如大地平草萊生即劃風過碧波清回春子曰性不離心心空無物草生用劃下乘之法靈明一點本清虛云去云來月自如應事還同光暫晦魄生依舊現明珠回春子曰不曉參禪那知拜佛一拳打破五指不撒心如野鳥最難馴才出籠時便要擒莫使隨風任南北本來狼藉陷深坑回春子曰分明一個月指早是個月日月光天德山河壯帝都咄誰識一點靈明一點金隨風揚去窅沉沉分明有個菩提種性亂神昏何處尋回春子曰穿衣吃飯不知飽暖心去性空火中蓮現愁苗情種兩都捐外若春風內鐵堅順死逆生同一理但於動靜卻非然回春子曰荊棘中不妨著腳深潭內也易翻身怕只怕清風明月坐對青山人生碌碌似浮萍業海風波何日停要識本來真面目勤從月下叩真人回春子曰一盂一鉢到處為家撞著老參舉杖便打渾淪元氣原無象庚甲之間覺有形莫道有無難自辨須明求已勝求人回春子曰摩尼一粒沙界難敵龍女獻來此際得識咦一個孩兒兩個娘四門親家不得疏失了也外濁須知內本清龍頭虎尾按時生若將凡聖和為一白雪黃芽自長成回春子曰如何是道要撒胞溺吃飯穿衣全不分曉大道先須養性靈靈光悟徹易歸根總然精氣神皆足黑暗如何解煉烹回春子曰東南西北及中州黑黑塵蒙易白頭咄説話的顛倒了難不難一翻斤斗易非易掙起雙眸緘口凝神只內觀法身常現一毫端靜中攝得靈明寶直置中宮便是丹回春子曰得了手閉了口若還不去承當竹篦何堪打走咄咄咄再來不值半文錢請到方丈後去休長空清回原無染云去云來只自忙鼓動巽風旋上下性光明寶總歸囊回春子曰一口布袋包藏無礙混混沌沌放不出來明暗休將世務分間來覓得己前身惺惺不得炎涼態生死全拋得至真回春子曰九天之上九泉之下少林拳棒上下齊打打得開通任放縱馬騰騰烈焰青龍舞渺渺清波白虎蹲虎尾龍頭絛索系擒歸神室合真源回春子曰久別家鄉道阻且長從今得返方知父母妻子各各安好咦千年華表依然一任桑田變海跋易曰至哉坤元萬物資生所謂順承乎乾者非耶然世之女子明坤道而合坤德者鮮矣或癡頑結習或奢悍成風種種沉迷不堪悉數即有一二有志之輩欲逃生死究之性命不明每見巫嫗村姑學些口頭禪語前果後因便為大道在是而盲修瞎煉自誤誤人籲此皆坤修真訣失傳之故也今西池集出泄千古不傳之祕具大慈悲開方便門願普天下女子敬信修持窮研極究其中字字有功句句有訣莫輕輕放過尚有楮墨難傳之處全在誠心辦道自遇真人指點總以收心養氣為下手初功心不收則性根昧氣不養則命蒂失性命雙修坤道乃全讀是集者幸勿坐失機緣以負作者一片度世婆心也靈陽子敬跋
